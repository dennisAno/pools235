<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EP-235 路線大師</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #1a1a1a;
            color: #ecf0f1;
            margin: 0;
            padding: 20px;
        }

        h1 { margin-bottom: 10px; color: #f1c40f; letter-spacing: 2px; }

        #canvas-container {
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            line-height: 0;
            border: 5px solid #444;
            border-radius: 8px;
            overflow: hidden;
            background-color: #333;
        }

        canvas { cursor: crosshair; max-width: 100%; height: auto; }

        .toolbar {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            background: linear-gradient(145deg, #2c3e50, #000000);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #555;
            align-items: center;
            justify-content: center;
        }

        .group { display: flex; gap: 10px; align-items: center; padding: 0 10px; border-right: 1px solid #555; }
        .group:last-child { border-right: none; }
        .label { font-size: 0.9em; color: #95a5a6; margin-right: 5px; }

        .ball-slot {
            width: 50px; height: 50px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-weight: bold; cursor: pointer; user-select: none;
            box-shadow: inset -3px -3px 8px rgba(0,0,0,0.5), 2px 3px 6px rgba(0,0,0,0.4);
            transition: 0.2s;
        }
        .ball-slot:hover { transform: scale(1.1); }

        .btn {
            padding: 8px 15px; background: #34495e; border: 1px solid #7f8c8d;
            color: white; cursor: pointer; border-radius: 5px; font-size: 14px;
        }
        .btn.active { background: #f1c40f; color: #000; border-color: #f39c12; }

        .color-opt {
            width: 25px; height: 25px; border-radius: 3px; cursor: pointer;
            border: 2px solid transparent;
        }
        .color-opt.active { border-color: #fff; transform: scale(1.2); }

        .white { background: #ffffff; color: #333; }
        .yellow { background: #f1c40f; color: #333; }
        .red { background: #e74c3c; color: white; }
        .blue { background: #3498db; }

        .controls-hint { margin-top: 10px; font-size: 0.85em; color: #7f8c8d; }
    </style>
</head>
<body>

    <h1>EP-235 路線大師</h1>

    <div id="canvas-container">
        <canvas id="poolTable"></canvas>
    </div>

    <div class="controls-hint">
        提示：左鍵拖曳球或畫線 | <strong>右鍵</strong>可取消上一個動作
    </div>

    <div class="toolbar">
        <div class="group">
            <span class="label">放球:</span>
            <div class="ball-slot white" onclick="addBall('cue')">母</div>
            <div class="ball-slot yellow" onclick="addBall('ball1')">1</div>
            <div class="ball-slot red" onclick="addBall('ball3')">3</div>
            <div class="ball-slot red" onclick="addBall('ball11')">11</div>
        </div>

        <div class="group">
            <span class="label">工具:</span>
            <button class="btn active" id="btn-move" onclick="setMode('move')">拖曳球</button>
            <button class="btn" id="btn-line" onclick="setMode('line')">直線</button>
            <button class="btn" id="btn-arrow" onclick="setMode('arrow')">箭頭線</button>
        </div>

        <div class="group">
            <span class="label">線色:</span>
            <div class="color-opt white active" onclick="setLineColor('#ffffff', this)"></div>
            <div class="color-opt yellow" onclick="setLineColor('#f1c40f', this)"></div>
            <div class="color-opt red" onclick="setLineColor('#e74c3c', this)"></div>
            <div class="color-opt blue" onclick="setLineColor('#3498db', this)"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('poolTable');
        const ctx = canvas.getContext('2d');
        
        let history = [];
        let mode = 'move'; // move, line, arrow
        let selectedColor = '#ffffff';
        let isDrawing = false;
        let startPoint = { x: 0, y: 0 };
        let currentPoint = { x: 0, y: 0 };
        
        let balls = {
            cue: { x: 0, y: 0, color: '#ffffff', label: '', textColor: '#000', active: false },
            ball1: { x: 0, y: 0, color: '#f1c40f', label: '1', textColor: '#000', active: false },
            ball3: { x: 0, y: 0, color: '#e74c3c', label: '3', textColor: '#fff', active: false },
            ball11: { x: 0, y: 0, color: '#e74c3c', label: '11', textColor: '#fff', active: false }
        };
        
        let lines = []; // 儲存畫好的線條 {type, x1, y1, x2, y2, color}

        const ballRadius = 22;
        let draggingBall = null;
        let tableImg = new Image();
        tableImg.src = '空白球桌.jpg';

        tableImg.onload = function() {
            canvas.width = tableImg.width;
            canvas.height = tableImg.height;
            draw();
        };

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(tableImg, 0, 0);

            // 1. 繪製已存在的線條
            lines.forEach(l => drawLineObj(l));

            // 2. 繪製正在畫的線條 (預覽)
            if (isDrawing && (mode === 'line' || mode === 'arrow')) {
                drawLineObj({ type: mode, x1: startPoint.x, y1: startPoint.y, x2: currentPoint.x, y2: currentPoint.y, color: selectedColor });
            }

            // 3. 繪製球
            for (let key in balls) {
                let b = balls[key];
                if (b.active) {
                    ctx.beginPath();
                    ctx.arc(b.x, b.y, ballRadius, 0, Math.PI * 2);
                    let grad = ctx.createRadialGradient(b.x-5, b.y-5, 2, b.x, b.y, ballRadius);
                    grad.addColorStop(0, '#fff');
                    grad.addColorStop(0.2, b.color);
                    grad.addColorStop(1, '#000');
                    ctx.fillStyle = grad;
                    ctx.fill();
                    ctx.fillStyle = b.textColor;
                    ctx.font = "bold 18px Arial";
                    ctx.textAlign = "center";
                    ctx.textBaseline = "middle";
                    ctx.fillText(b.label, b.x, b.y);
                    ctx.closePath();
                }
            }
        }

        function drawLineObj(l) {
            ctx.beginPath();
            ctx.strokeStyle = l.color;
            ctx.lineWidth = 3;
            ctx.moveTo(l.x1, l.y1);
            ctx.lineTo(l.x2, l.y2);
            ctx.stroke();

            if (l.type === 'arrow') {
                const angle = Math.atan2(l.y2 - l.y1, l.x2 - l.x1);
                const headLen = 15;
                ctx.beginPath();
                ctx.moveTo(l.x2, l.y2);
                ctx.lineTo(l.x2 - headLen * Math.cos(angle - Math.PI / 6), l.y2 - headLen * Math.sin(angle - Math.PI / 6));
                ctx.lineTo(l.x2 - headLen * Math.cos(angle + Math.PI / 6), l.y2 - headLen * Math.sin(angle + Math.PI / 6));
                ctx.closePath();
                ctx.fillStyle = l.color;
                ctx.fill();
            }
        }

        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            return { x: (e.clientX - rect.left) * scaleX, y: (e.clientY - rect.top) * scaleY };
        }

        canvas.onmousedown = function(e) {
            if (e.button === 2) return; // 右鍵不觸發
            const pos = getMousePos(e);

            if (mode === 'move') {
                const ballKeys = Object.keys(balls).reverse();
                for (let key of ballKeys) {
                    let b = balls[key];
                    if (b.active && Math.hypot(pos.x - b.x, pos.y - b.y) < ballRadius) {
                        saveHistory();
                        draggingBall = b;
                        return;
                    }
                }
            } else {
                saveHistory();
                isDrawing = true;
                startPoint = { ...pos };
                currentPoint = { ...pos };
            }
        };

        window.onmousemove = function(e) {
            const pos = getMousePos(e);
            if (draggingBall) {
                draggingBall.x = pos.x;
                draggingBall.y = pos.y;
                draw();
            } else if (isDrawing) {
                currentPoint = { ...pos };
                draw();
            }
        };

        window.onmouseup = function() {
            if (isDrawing) {
                lines.push({ type: mode, x1: startPoint.x, y1: startPoint.y, x2: currentPoint.x, y2: currentPoint.y, color: selectedColor });
                isDrawing = false;
                draw();
            }
            draggingBall = null;
        };

        canvas.oncontextmenu = function(e) {
            e.preventDefault();
            undo();
        };

        // UI 切換功能
        function setMode(newMode) {
            mode = newMode;
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + newMode).classList.add('active');
        }

        function setLineColor(color, el) {
            selectedColor = color;
            document.querySelectorAll('.color-opt').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
        }

        function addBall(type) {
            saveHistory();
            balls[type].active = true;
            balls[type].x = canvas.width / 2;
            balls[type].y = canvas.height / 2;
            setMode('move');
            draw();
        }

        function saveHistory() {
            history.push(JSON.stringify({ balls, lines }));
            if (history.length > 50) history.shift();
        }

        function undo() {
            if (history.length > 0) {
                const state = JSON.parse(history.pop());
                balls = state.balls;
                lines = state.lines;
                draw();
            }
        }
    </script>
</body>
</html>

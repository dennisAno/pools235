<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EP-235 路線大師</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #1a1a1a;
            color: #ecf0f1;
            margin: 0;
            padding: 10px;
            overscroll-behavior-y: contain;
            user-select: none;
            -webkit-user-select: none;
        }

        h1 { margin: 10px 0; color: #f1c40f; font-size: 1.5rem; letter-spacing: 2px; }

        #canvas-container {
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            line-height: 0;
            border: 3px solid #444;
            border-radius: 8px;
            overflow: hidden;
            background-color: #333;
            width: 95vw;
            max-width: 800px;
        }

        canvas { 
            cursor: crosshair; 
            width: 100%; 
            height: auto;
            touch-action: none;
            -webkit-touch-callout: none;
        }

        .toolbar {
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: linear-gradient(145deg, #2c3e50, #000000);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid #555;
            width: 90vw;
            max-width: 600px;
        }

        .group { display: flex; gap: 8px; align-items: center; justify-content: center; flex-wrap: wrap; }
        .label { font-size: 0.85em; color: #95a5a6; min-width: 40px; }

        .ball-slot {
            width: 45px; height: 45px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-weight: bold; cursor: pointer;
            border: 1px solid rgba(0,0,0,0.3);
        }

        .btn {
            padding: 8px 12px; background: #34495e; border: 1px solid #7f8c8d;
            color: white; cursor: pointer; border-radius: 5px; font-size: 13px;
        }
        .btn.active { background: #f1c40f; color: #000; border-color: #f39c12; }

        .color-opt {
            width: 30px; height: 30px; border-radius: 5px; cursor: pointer;
            border: 2px solid transparent;
        }
        .color-opt.active { border-color: #fff; transform: scale(1.1); }

        .white { background: #ffffff; color: #333; }
        .yellow { background: #f1c40f; color: #333; }
        .red { background: #e74c3c; color: white; }
        .blue { background: #3498db; }

        .undo-btn {
            background-color: #95a5a6; color: #1a1a1a; font-weight: bold; width: 100%;
            margin-top: 5px; padding: 10px; border-radius: 5px; border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>EP-235 路線大師</h1>

    <div id="canvas-container">
        <canvas id="poolTable"></canvas>
    </div>

    <div class="toolbar">
        <div class="group">
            <button class="btn active" id="btn-move" onclick="setMode('move')">拖曳球</button>
            <button class="btn" id="btn-line" onclick="setMode('line')">直線</button>
            <button class="btn" id="btn-arrow" onclick="setMode('arrow')">箭頭線</button>
            <div style="width: 10px;"></div>
            <div class="color-opt white active" onclick="setLineColor('#ffffff', this)"></div>
            <div class="color-opt yellow" onclick="setLineColor('#f1c40f', this)"></div>
            <div class="color-opt red" onclick="setLineColor('#e74c3c', this)"></div>
            <div class="color-opt blue" onclick="setLineColor('#3498db', this)"></div>
        </div>

        <div class="group">
            <span class="label">放球:</span>
            <div class="ball-slot white" onclick="addBall('cue')">母</div>
            <div class="ball-slot yellow" onclick="addBall('ball1')">1</div>
            <div class="ball-slot red" onclick="addBall('ball3')">3</div>
            <div class="ball-slot red" onclick="addBall('ball11')">11</div>
        </div>

        <button class="undo-btn" onclick="undo()">⬅ 復原上一步</button>
    </div>

    <script>
        const canvas = document.getElementById('poolTable');
        const ctx = canvas.getContext('2d');
        
        let history = [];
        let mode = 'move'; 
        let selectedColor = '#ffffff';
        let isDrawing = false;
        let startPoint = { x: 0, y: 0 };
        let currentPoint = { x: 0, y: 0 };
        
        let balls = {
            cue: { x: 0, y: 0, color: '#ffffff', label: '', textColor: '#000', active: false },
            ball1: { x: 0, y: 0, color: '#f1c40f', label: '1', textColor: '#000', active: false },
            ball3: { x: 0, y: 0, color: '#e74c3c', label: '3', textColor: '#fff', active: false },
            ball11: { x: 0, y: 0, color: '#e74c3c', label: '11', textColor: '#fff', active: false }
        };
        
        let lines = []; 
        const ballRadius = 22;
        let draggingBall = null;
        let tableImg = new Image();
        tableImg.src = '空白球桌.jpg';

        tableImg.onload = function() {
            canvas.width = tableImg.width;
            canvas.height = tableImg.height;
            draw();
        };

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(tableImg, 0, 0);
            lines.forEach(l => drawLineObj(l));
            if (isDrawing && (mode === 'line' || mode === 'arrow')) {
                drawLineObj({ type: mode, x1: startPoint.x, y1: startPoint.y, x2: currentPoint.x, y2: currentPoint.y, color: selectedColor });
            }
            for (let key in balls) {
                let b = balls[key];
                if (b.active) {
                    ctx.beginPath();
                    ctx.arc(b.x, b.y, ballRadius, 0, Math.PI * 2);
                    // 改為純色填充
                    ctx.fillStyle = b.color;
                    ctx.fill();
                    // 加入黑色細邊框增加辨識度
                    ctx.lineWidth = 2;
                    ctx.strokeStyle = '#000000';
                    ctx.stroke();
                    
                    ctx.fillStyle = b.textColor;
                    ctx.font = "bold 18px Arial";
                    ctx.textAlign = "center";
                    ctx.textBaseline = "middle";
                    ctx.fillText(b.label, b.x, b.y);
                    ctx.closePath();
                }
            }
        }

        function drawLineObj(l) {
            ctx.beginPath();
            ctx.strokeStyle = l.color;
            ctx.lineWidth = 3;
            ctx.moveTo(l.x1, l.y1);
            ctx.lineTo(l.x2, l.y2);
            ctx.stroke();
            if (l.type === 'arrow') {
                const angle = Math.atan2(l.y2 - l.y1, l.x2 - l.x1);
                const headLen = 15;
                ctx.beginPath();
                ctx.moveTo(l.x2, l.y2);
                ctx.lineTo(l.x2 - headLen * Math.cos(angle - Math.PI / 6), l.y2 - headLen * Math.sin(angle - Math.PI / 6));
                ctx.lineTo(l.x2 - headLen * Math.cos(angle + Math.PI / 6), l.y2 - headLen * Math.sin(angle + Math.PI / 6));
                ctx.closePath();
                ctx.fillStyle = l.color;
                ctx.fill();
            }
        }

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
        }

        function handleStart(e) {
            if (e.button === 2) return;
            const pos = getPos(e);
            if (mode === 'move') {
                const ballKeys = Object.keys(balls).reverse();
                for (let key of ballKeys) {
                    let b = balls[key];
                    if (b.active && Math.hypot(pos.x - b.x, pos.y - b.y) < ballRadius) {
                        saveHistory();
                        draggingBall = b;
                        return;
                    }
                }
            } else {
                saveHistory();
                isDrawing = true;
                startPoint = { ...pos };
                currentPoint = { ...pos };
            }
        }

        function handleMove(e) {
            if (!draggingBall && !isDrawing) return;
            if (e.cancelable) e.preventDefault();
            const pos = getPos(e);
            if (draggingBall) {
                draggingBall.x = pos.x;
                draggingBall.y = pos.y;
            } else if (isDrawing) {
                currentPoint = { ...pos };
            }
            draw();
        }

        function handleEnd() {
            if (isDrawing) {
                lines.push({ type: mode, x1: startPoint.x, y1: startPoint.y, x2: currentPoint.x, y2: currentPoint.y, color: selectedColor });
                isDrawing = false;
                draw();
            }
            draggingBall = null;
        }

        canvas.addEventListener('mousedown', handleStart);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', handleEnd);
        canvas.addEventListener('touchstart', handleStart, {passive: false});
        window.addEventListener('touchmove', handleMove, {passive: false});
        window.addEventListener('touchend', handleEnd);

        canvas.oncontextmenu = function(e) { e.preventDefault(); undo(); };

        function setMode(newMode) {
            mode = newMode;
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + newMode).classList.add('active');
        }

        function setLineColor(color, el) {
            selectedColor = color;
            document.querySelectorAll('.color-opt').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
        }

        function addBall(type) {
            saveHistory();
            balls[type].active = true;
            balls[type].x = canvas.width / 2;
            balls[type].y = canvas.height / 2;
            setMode('move');
            draw();
        }

        function saveHistory() {
            history.push(JSON.stringify({ balls, lines }));
            if (history.length > 50) history.shift();
        }

        function undo() {
            if (history.length > 0) {
                const state = JSON.parse(history.pop());
                balls = state.balls;
                lines = state.lines;
                draw();
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EP-235 路線大師</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --panel-bg: linear-gradient(145deg, #2c3e50, #000000);
            --accent: #f1c40f;
        }

        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            background-color: var(--bg-color);
            color: #ecf0f1;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            overscroll-behavior: none;
        }

        h1 { margin: 5px 0; color: var(--accent); font-size: 1.2rem; flex-shrink: 0; }

        .main-layout {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: calc(100% - 40px);
            align-items: center;
            justify-content: center;
            padding: 5px;
            box-sizing: border-box;
            gap: 10px;
        }

        #canvas-outer {
            position: relative;
            box-shadow: 0 5px 20px rgba(0,0,0,0.8);
            border: 2px solid #444;
            background-color: #333;
            width: 95vw;
            height: 60vh;
            overflow: auto; /* 允許縮放後捲動 */
            display: flex;
            align-items: flex-start;
            justify-content: flex-start;
        }

        canvas {
            touch-action: none;
            cursor: crosshair;
            transform-origin: 0 0;
        }

        .toolbar {
            display: flex;
            flex-direction: column;
            background: var(--panel-bg);
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #555;
            gap: 8px;
            width: 95%;
            max-width: 500px;
            flex-shrink: 0;
        }

        @media (orientation: landscape) and (max-height: 500px) {
            h1 { display: none; }
            .main-layout { flex-direction: row; height: 100%; }
            #canvas-outer { width: 70vw; height: 90vh; }
            .toolbar { width: auto; height: 90vh; max-width: 200px; overflow-y: auto; }
            .group { flex-direction: column; }
        }

        .group { display: flex; gap: 6px; align-items: center; justify-content: center; flex-wrap: wrap; }
        .ball-slot {
            width: 35px; height: 35px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-weight: bold; cursor: pointer; border: 1px solid #000; font-size: 14px;
        }
        .btn {
            padding: 6px 10px; background: #34495e; border: 1px solid #7f8c8d;
            color: white; border-radius: 4px; font-size: 12px; cursor: pointer;
        }
        .btn.active { background: var(--accent); color: #000; }
        .zoom-btn { background: #16a085; font-weight: bold; min-width: 35px; }

        .color-opt { width: 22px; height: 22px; border-radius: 4px; border: 2px solid transparent; }
        .color-opt.active { border-color: #fff; transform: scale(1.1); }

        .white { background: #fff; color: #000; }
        .yellow { background: var(--accent); color: #000; }
        .red { background: #e74c3c; color: #fff; }
        .blue { background: #3498db; }

        .undo-btn { background: #95a5a6; color: #000; font-weight: bold; padding: 8px; border-radius: 4px; border: none; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

    <h1>EP-235 路線大師</h1>

    <div class="main-layout">
        <div id="canvas-outer">
            <canvas id="poolTable"></canvas>
        </div>

        <div class="toolbar">
            <div class="group">
                <button class="btn zoom-btn" onclick="adjustZoom(0.1)">🔍+</button>
                <button class="btn zoom-btn" onclick="adjustZoom(-0.1)">🔍-</button>
                <button class="btn active" id="btn-move" onclick="setMode('move')">拖曳</button>
                <button class="btn" id="btn-line" onclick="setMode('line')">直線</button>
                <button class="btn" id="btn-arrow" onclick="setMode('arrow')">箭頭</button>
            </div>
            
            <div class="group">
                <div class="color-opt white active" onclick="setLineColor('#ffffff', this)"></div>
                <div class="color-opt yellow" onclick="setLineColor('#f1c40f', this)"></div>
                <div class="color-opt red" onclick="setLineColor('#e74c3c', this)"></div>
                <div class="color-opt blue" onclick="setLineColor('#3498db', this)"></div>
                <div style="width: 10px;"></div>
                <div class="ball-slot white" onclick="addBall('cue')">母</div>
                <div class="ball-slot yellow" onclick="addBall('ball1')">1</div>
                <div class="ball-slot red" onclick="addBall('ball3')">3</div>
                <div class="ball-slot red" onclick="addBall('ball11')">11</div>
            </div>

            <button class="undo-btn" onclick="undo()">⬅ 復原</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('poolTable');
        const outer = document.getElementById('canvas-outer');
        const ctx = canvas.getContext('2d');
        let history = [], mode = 'move', selectedColor = '#ffffff', zoom = 1.0;
        let isDrawing = false, startPoint = {}, currentPoint = {}, draggingBall = null;
        
        let balls = {
            cue: { x: 0, y: 0, color: '#ffffff', label: '', textColor: '#000', active: false },
            ball1: { x: 0, y: 0, color: '#f1c40f', label: '1', textColor: '#000', active: false },
            ball3: { x: 0, y: 0, color: '#e74c3c', label: '3', textColor: '#fff', active: false },
            ball11: { x: 0, y: 0, color: '#e74c3c', label: '11', textColor: '#fff', active: false }
        };
        let lines = [];
        const ballRadius = 22;
        const tableImg = new Image();
        tableImg.src = '空白球桌.jpg';

        tableImg.onload = () => {
            canvas.width = tableImg.width;
            canvas.height = tableImg.height;
            // 初始自動縮放以適應螢幕
            zoom = Math.min(outer.clientWidth / canvas.width, outer.clientHeight / canvas.height) * 0.95;
            applyZoom();
            draw();
        };

        function adjustZoom(delta) {
            zoom = Math.max(0.2, Math.min(3.0, zoom + delta));
            applyZoom();
        }

        function applyZoom() {
            canvas.style.transform = `scale(${zoom})`;
            // 更新外框容器以顯示捲軸
            canvas.style.width = (canvas.width) + 'px';
            canvas.style.height = (canvas.height) + 'px';
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(tableImg, 0, 0);
            lines.forEach(l => drawLineObj(l));
            if (isDrawing && (mode === 'line' || mode === 'arrow')) {
                drawLineObj({ type: mode, x1: startPoint.x, y1: startPoint.y, x2: currentPoint.x, y2: currentPoint.y, color: selectedColor });
            }
            for (let key in balls) {
                let b = balls[key];
                if (b.active) {
                    ctx.beginPath();
                    ctx.arc(b.x, b.y, ballRadius, 0, Math.PI * 2);
                    ctx.fillStyle = b.color;
                    ctx.fill();
                    ctx.lineWidth = 2; ctx.strokeStyle = '#000'; ctx.stroke();
                    ctx.fillStyle = b.textColor;
                    ctx.font = "bold 18px Arial"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
                    ctx.fillText(b.label, b.x, b.y);
                }
            }
        }

        function drawLineObj(l) {
            ctx.beginPath();
            ctx.strokeStyle = l.color; ctx.lineWidth = 3;
            ctx.moveTo(l.x1, l.y1); ctx.lineTo(l.x2, l.y2);
            ctx.stroke();
            if (l.type === 'arrow') {
                const angle = Math.atan2(l.y2 - l.y1, l.x2 - l.x1);
                const headLen = 15;
                ctx.beginPath();
                ctx.moveTo(l.x2, l.y2);
                ctx.lineTo(l.x2 - headLen * Math.cos(angle - Math.PI / 6), l.y2 - headLen * Math.sin(angle - Math.PI / 6));
                ctx.lineTo(l.x2 - headLen * Math.cos(angle + Math.PI / 6), l.y2 - headLen * Math.sin(angle + Math.PI / 6));
                ctx.closePath();
                ctx.fillStyle = l.color; ctx.fill();
            }
        }

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            // 縮放狀態下的座標轉換邏輯
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { 
                x: (clientX - rect.left) / zoom, 
                y: (clientY - rect.top) / zoom 
            };
        }

        function handleStart(e) {
            if (e.button === 2) return;
            const pos = getPos(e);
            if (mode === 'move') {
                const keys = Object.keys(balls).reverse();
                for (let k of keys) {
                    let b = balls[k];
                    if (b.active && Math.hypot(pos.x - b.x, pos.y - b.y) < ballRadius) {
                        saveHistory(); draggingBall = b; return;
                    }
                }
            } else {
                saveHistory(); isDrawing = true; startPoint = { ...pos }; currentPoint = { ...pos };
            }
        }

        function handleMove(e) {
            if (!draggingBall && !isDrawing) return;
            if (e.cancelable) e.preventDefault();
            const pos = getPos(e);
            if (draggingBall) { draggingBall.x = pos.x; draggingBall.y = pos.y; }
            else if (isDrawing) { currentPoint = { ...pos }; }
            draw();
        }

        function handleEnd() {
            if (isDrawing) {
                lines.push({ type: mode, x1: startPoint.x, y1: startPoint.y, x2: currentPoint.x, y2: currentPoint.y, color: selectedColor });
                isDrawing = false;
            }
            draggingBall = null;
            draw();
        }

        canvas.addEventListener('mousedown', handleStart);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', handleEnd);
        canvas.addEventListener('touchstart', handleStart, {passive: false});
        window.addEventListener('touchmove', handleMove, {passive: false});
        window.addEventListener('touchend', handleEnd);
        canvas.oncontextmenu = (e) => { e.preventDefault(); undo(); };

        function setMode(m) {
            mode = m;
            document.querySelectorAll('.btn').forEach(b => b.classList.toggle('active', b.id === 'btn-'+m));
        }

        function setLineColor(c, el) {
            selectedColor = c;
            document.querySelectorAll('.color-opt').forEach(opt => opt.classList.toggle('active', opt === el));
        }

        function addBall(t) {
            saveHistory();
            balls[t].active = true;
            balls[t].x = canvas.width / 2;
            balls[t].y = canvas.height / 2;
            setMode('move');
            draw();
        }

        function saveHistory() {
            history.push(JSON.stringify({ balls, lines }));
            if (history.length > 50) history.shift();
        }

        function undo() {
            if (history.length > 0) {
                const s = JSON.parse(history.pop());
                balls = s.balls; lines = s.lines;
                draw();
            }
        }
    </script>
</body>
</html>
